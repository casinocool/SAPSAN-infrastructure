server {
    listen 80;
    server_name sapsan.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sapsan.local;

    ssl_certificate /etc/nginx/certs/sapsan.crt;
    ssl_certificate_key /etc/nginx/certs/sapsan.key;

    # Keycloak (твое основное требование по HTTPS)
    location /auth/ {
        # Используем имя сервиса из твоего файла
        proxy_pass http://keycloak:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Grafana (у тебя она на 3000 порту)
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
    }

    # Nexus (у тебя он на 8081 порту)
    location /nexus/ {
        proxy_pass http://nexus:8081/;
        proxy_set_header Host $host;
    }
}